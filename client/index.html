    <script>
      (() => {
        const pathname = window.location.pathname;
        console.log("dheeraj");

        const titleRoutes = [
          {
            match: (path) => path === "/",
            title: "Full Stack Learning | Become a FSD the correct way",
          },
          {
            match: (path) => path === "/privacy-policy",
            title: "Privacy Policy | Full Stack Learning",
          },

            match: (path) => path === "/terms-of-service",
            title: "Terms of Service | Full Stack Learning",
          },
          {
            match: (path) => path === "/sitemap",
            title: "Sitemap | Full Stack Learning",
          },
          {
            match: (path) => path === "/admin" || path.startsWith("/admin/"),
            title: "Admin Panel | Full Stack Learning",
          },
          {
            match: (path) =>
              path === "/student" || path.startsWith("/student/"),
            title: "Student Panel | Full Stack Learning",
          },
          {
            match: (path) =>
              path === "/courses" || path.startsWith("/courses/"),
            title: "Our Courses | Full Stack Learning",
          },
          {
            match: (path) =>
              path === "/register" || path.startsWith("/register/"),
            title: "Registration Form | Full Stack Learning",
          },
        ];

        const matchedRoute = titleRoutes.find((route) => route.match(pathname));

        if (matchedRoute) {
          document.title = matchedRoute.title;
        } else
          document.title = "Full Stack Learning | Become a FSD the correct way";
