<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/fsl.png" type="image/png">
    <title>Full Stack Learning</title>
    <script>
      (() => {
        const pathname = window.location.pathname;

        if (pathname === "/") {
          document.title = "Full Stack Learning | Become a FSD the correct way";
          return;
        }

        if (pathname === "/privacy-policy") {
          document.title = "Privacy Policy | Full Stack Learning";
          return;
        }

        if (pathname === "/terms-of-service") {
          document.title = "Terms of Service | Full Stack Learning";
          return;
        }

        if (pathname === "/sitemap") {
          document.title = "Sitemap | Full Stack Learning";
          return;
        }

        if (pathname === "/admin" || pathname.startsWith("/admin/")) {
          document.title = "Admin Panel";
          return;
        }

        if (pathname === "/student" || pathname.startsWith("/student/")) {
          document.title = "Student Panel";
          return;
        }

        document.title = "Full Stack Learning";
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
