# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# This workflow is triggered on pushes to the main branch that affect files in the server directory or the workflow file itself.
name: fsl-server-prod

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/main_fsl-server-prod.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install + build (server)
        working-directory: server
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CFF59434E7214A9ABD7695C72F98DCA2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_592EB5C3ABE744148995F6E5913B29B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2800DAE4692B45A4A0E7AA53CF527844 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fsl-server-prod'
          slot-name: 'Production'
          package: ./server
